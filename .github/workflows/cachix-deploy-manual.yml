name: "Cachix Deploy: Manual"
run-name: "Cachix Deploy: Manual"

on:
  workflow_dispatch:
    inputs:
      hosts:
        description: "Comma-separated hosts to deploy. Empty previews changed hosts; all deploys every deployable host."
        required: false
        default: ""
        type: string
      force:
        description: "Redeploy selected hosts even when deployed-host-* already matches built state."
        required: true
        default: false
        type: boolean

concurrency:
  group: cachix-deploy-master
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  plan:
    name: "Plan manual Cachix deploy"
    runs-on: ubuntu-latest
    timeout-minutes: 75
    outputs:
      selected_count: ${{ steps.plan.outputs.selected_count }}
      preview: ${{ steps.plan.outputs.preview }}
      selected_hosts: ${{ steps.plan.outputs.selected_hosts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Plan deploy
        id: plan
        shell: bash
        env:
          CACHIX_CACHE_NAME: whitestrake
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_DEPLOY_REV: ${{ github.sha }}
          CACHIX_DEPLOY_BRANCH: ${{ github.ref_name }}
          CACHIX_DEPLOY_HOSTS: ${{ inputs.hosts }}
          CACHIX_DEPLOY_FORCE: ${{ inputs.force && 'true' || 'false' }}
          CACHIX_DEPLOY_OUTPUT_DIR: ${{ runner.temp }}/cachix-deploy-plan
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
        run: bash modules/deployment/scripts/cachix-github-deploy-plan.sh

      - name: Build and push selected deploy closures
        if: ${{ steps.plan.outputs.preview != 'true' && steps.plan.outputs.selected_count != '0' }}
        shell: bash
        env:
          DEPLOY_PLAN_FILE: ${{ runner.temp }}/cachix-deploy-plan/deploy-plan.json
        run: |
          set -euo pipefail

          while IFS=$'\t' read -r host system store_path rollback_script; do
            echo "Building deploy closure for $host..."
            nix build --no-link \
              ".#nixosConfigurations.$host.config.system.build.toplevel" \
              ".#packages.$system.deploy-health-rollback-script"

            nix path-info --recursive "$store_path" "$rollback_script" \
              | cachix push whitestrake
          done < <(
            jq -r '
              .include[]
              | [
                  .host,
                  .system,
                  .storePath,
                  .rollbackScript
                ]
              | @tsv
            ' "$DEPLOY_PLAN_FILE"
          )

      - name: Upload Cachix deploy plan
        uses: actions/upload-artifact@v7
        with:
          name: cachix-deploy-plan
          path: ${{ runner.temp }}/cachix-deploy-plan/deploy-plan.json
          if-no-files-found: error
          retention-days: 1

  dispatch:
    name: "Dispatch Cachix deploy"
    needs: plan
    if: >-
      ${{
        needs.plan.outputs.preview != 'true'
        && needs.plan.outputs.selected_count != '0'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Download Cachix deploy plan
        uses: actions/download-artifact@v8
        with:
          name: cachix-deploy-plan
          path: ${{ runner.temp }}/cachix-deploy-plan

      - name: Prepare deployment matrix
        shell: bash
        env:
          DEPLOY_PLAN_FILE: ${{ runner.temp }}/cachix-deploy-plan/deploy-plan.json
          DEPLOY_MATRIX_FILE: ${{ runner.temp }}/cachix-deploy-plan/deployment-matrix.json
        run: |
          set -euo pipefail

          jq '{
            include: (
              .include
              | map({
                  host,
                  system,
                  storePath,
                  rollbackScript
                })
            )
          }' "$DEPLOY_PLAN_FILE" > "$DEPLOY_MATRIX_FILE"

      - name: Dispatch Cachix deploy workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CACHIX_DEPLOY_BRANCH: ${{ github.ref_name }}
          CACHIX_DEPLOY_REV: ${{ github.sha }}
          DEPLOYMENT_MATRIX_FILE: ${{ runner.temp }}/cachix-deploy-plan/deployment-matrix.json
        run: |
          set -euo pipefail

          matrix="$(jq -c . "$DEPLOYMENT_MATRIX_FILE")"

          gh workflow run "Cachix Deploy" \
            --ref "$CACHIX_DEPLOY_BRANCH" \
            -f deployment_environment="production" \
            -f deployment_sha="$CACHIX_DEPLOY_REV" \
            -f deployment_source="github-actions" \
            -f matrix="$matrix"
