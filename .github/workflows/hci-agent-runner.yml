name: "HCI Agent Runners"
run-name: "HCI Agent Runners"

on:
  push:
  workflow_dispatch:
    inputs:
      revision:
        description: "Git revision to monitor in Hercules CI. Defaults to this workflow run revision."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  statuses: read

env:
  AARCH64_LINUX_CACHE_KEY_PREFIX: ${{ github.ref == 'refs/heads/master' && 'hci-aarch64-linux-ext4-v1-master' || 'hci-aarch64-linux-ext4-v1-non-master' }}
  AARCH64_LINUX_NIX_ATTR: .#nixosConfigurations.jaeger.config.system.build.toplevel
  AARCH64_LINUX_NIX_IMAGE_SIZE: 8G

# Notes from the Darwin HCI runner trial:
# - Plain GitHub substitution and Magic Nix Cache both lost to sparsebundle-backed
#   runners for time-to-useful HCI capacity; Magic was removed after it still had
#   to materialize the same large closure through its local proxy.
# - The current comparison keeps the useful paths only: GitHub sparsebundle cache,
#   Namespace cache volume, and Namespace artifact-backed sparsebundle storage.
# - The goal is an ephemeral runner that behaves like a warm permanent Darwin
#   agent: attach a populated /nix sparsebundle, come online quickly, then let HCI
#   assign any delta work.
# - If Namespace cache-volume pricing is acceptable, the likely end-state is a
#   hybrid: keep the sparsebundle on the cache volume, restore the artifact only
#   on cache-volume miss/corruption, and always upload the final sparsebundle
#   artifact as the durable fallback.
jobs:
  darwin-agent-github-cache:
    name: "GitHub Sparsebundle Cache Runner"
    runs-on: macos-26
    timeout-minutes: 355
    concurrency:
      group: hci-agent-runner-github-aarch64-darwin
      cancel-in-progress: false
    env:
      GITHUB_NIX_CACHE_KEY_PREFIX: hci-darwin-github-sparsebundle-v1
      GITHUB_NIX_STORE_IMAGE_SIZE: 30g
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.revision || github.sha }}
          persist-credentials: false

      - name: Start GitHub sparsebundle cache restore
        shell: bash
        run: |
          set -euo pipefail

          image_bundle="$RUNNER_TEMP/hci-darwin-nix-store/nix-root.sparsebundle"

          mkdir -p "$(dirname "$image_bundle")"
          echo "GITHUB_NIX_STORE_IMAGE_BUNDLE=$image_bundle" >> "$GITHUB_ENV"
          echo "GITHUB_CACHE_RESTORE_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Restore GitHub sparsebundle cache
        id: github-nix-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/hci-darwin-nix-store/nix-root.sparsebundle
          key: ${{ env.GITHUB_NIX_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ env.GITHUB_NIX_CACHE_KEY_PREFIX }}-

      - name: Prepare GitHub cached sparsebundle Nix root
        shell: bash
        env:
          CACHE_HIT: ${{ steps.github-nix-cache-restore.outputs.cache-hit }}
          CACHE_MATCHED_KEY: ${{ steps.github-nix-cache-restore.outputs.cache-matched-key }}
        run: |
          set -euo pipefail

          synthetic_conf=/etc/synthetic.conf
          restore_duration="$(($(date +%s) - GITHUB_CACHE_RESTORE_STARTED_AT))"

          echo "GITHUB_CACHE_IMAGE_RESTORE_DONE hit=${CACHE_HIT:-} matchedKey=${CACHE_MATCHED_KEY:-} durationSeconds=$restore_duration"

          if zstd_path="$(command -v zstd 2>/dev/null)"; then
            zstd_version="$("$zstd_path" --version 2>/dev/null || true)"
            echo "GITHUB_CACHE_ZSTD_LOCAL available=true path=$zstd_path version=$zstd_version"
          else
            echo "GITHUB_CACHE_ZSTD_LOCAL available=false"
          fi

          sudo touch "$synthetic_conf"

          if grep -qE '^nix($|[[:space:]])' "$synthetic_conf"; then
            if ! grep -qx 'nix' "$synthetic_conf"; then
              echo "::error ::$synthetic_conf already defines nix differently."
              grep -nE '^nix($|[[:space:]])' "$synthetic_conf" || true
              exit 1
            fi
          else
            printf 'nix\n' | sudo tee -a "$synthetic_conf" >/dev/null
          fi

          if ! sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -B >/dev/null 2>&1; then
            sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t >/dev/null 2>&1 \
              || echo "apfs.util did not report successful synthetic object materialization; validating /nix directly."
          fi

          if [ ! -e /nix ]; then
            echo "::error ::macOS did not materialize synthetic /nix."
            sudo cat "$synthetic_conf"
            exit 1
          fi

          if [ -L /nix ]; then
            echo "::error ::/nix is a symlink; Nix requires /nix to be a real directory or mountpoint."
            ls -ld /nix
            exit 1
          fi

          if [ -d "$GITHUB_NIX_STORE_IMAGE_BUNDLE" ]; then
            echo "GITHUB_CACHE_IMAGE_READY path=$GITHUB_NIX_STORE_IMAGE_BUNDLE source=cache"
          else
            started="$SECONDS"
            hdiutil create \
              -size "$GITHUB_NIX_STORE_IMAGE_SIZE" \
              -type SPARSEBUNDLE \
              -fs 'Case-sensitive Journaled HFS+' \
              -volname NixStore \
              "$GITHUB_NIX_STORE_IMAGE_BUNDLE"
            duration="$((SECONDS - started))"
            echo "GITHUB_CACHE_IMAGE_CREATED path=$GITHUB_NIX_STORE_IMAGE_BUNDLE size=$GITHUB_NIX_STORE_IMAGE_SIZE fs=case-sensitive-jhfs-plus durationSeconds=$duration"
          fi

          started="$SECONDS"
          sudo hdiutil attach \
            -mountpoint /nix \
            -nobrowse \
            "$GITHUB_NIX_STORE_IMAGE_BUNDLE"
          duration="$((SECONDS - started))"
          echo "GITHUB_CACHE_IMAGE_ATTACHED path=$GITHUB_NIX_STORE_IMAGE_BUNDLE mountPoint=/nix durationSeconds=$duration"

          sudo chown "$USER" /nix
          chmod u+rwx /nix

          echo "Mounted GitHub cache sparsebundle $GITHUB_NIX_STORE_IMAGE_BUNDLE at /nix"

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName github-aarch64-darwin
          sudo scutil --set LocalHostName github-aarch64-darwin
          sudo hostname github-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          GITHUB_TOKEN: ${{ github.token }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_JOB_NAME_FILE: ${{ runner.temp }}/hci-final-gate-job-name
          HCI_DARWIN_RESOLVE_FINAL_GATE_JOB_NAME: "1"
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh
      - name: Prepare GitHub sparsebundle cache save
        shell: bash
        run: |
          set -euo pipefail

          started="$SECONDS"
          sync
          if sudo hdiutil detach /nix; then
            :
          else
            sudo hdiutil detach -force /nix
          fi
          duration="$((SECONDS - started))"
          echo "GITHUB_CACHE_IMAGE_DETACHED path=$GITHUB_NIX_STORE_IMAGE_BUNDLE mountPoint=/nix durationSeconds=$duration"

          if [ ! -d "$GITHUB_NIX_STORE_IMAGE_BUNDLE" ]; then
            echo "::error ::GitHub cache Nix sparsebundle is missing at $GITHUB_NIX_STORE_IMAGE_BUNDLE."
            ls -la "$(dirname "$GITHUB_NIX_STORE_IMAGE_BUNDLE")"
            exit 1
          fi

          du -sh "$GITHUB_NIX_STORE_IMAGE_BUNDLE" || true
          echo "GITHUB_CACHE_SAVE_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Save GitHub sparsebundle cache
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/hci-darwin-nix-store/nix-root.sparsebundle
          key: ${{ env.GITHUB_NIX_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Report GitHub sparsebundle cache save
        shell: bash
        run: |
          set -euo pipefail

          save_duration="$(($(date +%s) - GITHUB_CACHE_SAVE_STARTED_AT))"
          echo "GITHUB_CACHE_UPLOAD_COMPLETE key=$GITHUB_NIX_CACHE_KEY_PREFIX-${{ github.run_id }}-${{ github.run_attempt }} durationSeconds=$save_duration"

  aarch64-linux-cache-readers:
    name: "GitHub aarch64-linux Cache Reader ${{ matrix.runner }}"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 355
    strategy:
      fail-fast: false
      matrix:
        runner: [1, 2]
    env:
      AARCH64_LINUX_RUNNER_HOSTNAME: github-aarch64-linux-${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.revision || github.sha }}
          persist-credentials: false

      - name: Start aarch64-linux ext4 cache restore
        shell: bash
        run: |
          set -euo pipefail

          image_dir="$RUNNER_TEMP/hci-aarch64-linux-nix-image"
          image="$image_dir/nix-root.ext4"
          archive="$image.zst"

          mkdir -p "$image_dir"

          {
            printf 'AARCH64_LINUX_NIX_IMAGE=%s\n' "$image"
            printf 'AARCH64_LINUX_NIX_IMAGE_ARCHIVE=%s\n' "$archive"
            printf 'AARCH64_LINUX_CACHE_RESTORE_STARTED_AT=%s\n' "$(date +%s)"
          } >> "$GITHUB_ENV"

          df -h

      - name: Restore aarch64-linux ext4 image cache
        id: aarch64-linux-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/hci-aarch64-linux-nix-image/nix-root.ext4.zst
          key: ${{ env.AARCH64_LINUX_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}-reader-${{ matrix.runner }}
          restore-keys: |
            ${{ env.AARCH64_LINUX_CACHE_KEY_PREFIX }}-

      - name: Prepare aarch64-linux Nix image
        shell: bash
        env:
          CACHE_HIT: ${{ steps.aarch64-linux-cache-restore.outputs.cache-hit }}
          CACHE_MATCHED_KEY: ${{ steps.aarch64-linux-cache-restore.outputs.cache-matched-key }}
        run: |
          set -euo pipefail

          restore_duration="$(($(date +%s) - AARCH64_LINUX_CACHE_RESTORE_STARTED_AT))"
          echo "AARCH64_LINUX_CACHE_RESTORE_DONE hit=${CACHE_HIT:-} matchedKey=${CACHE_MATCHED_KEY:-} durationSeconds=$restore_duration"

          for tool in zstd mkfs.ext4 truncate mount df du; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error ::$tool is required for the aarch64-linux ext4 image cache prototype."
              exit 1
            fi
          done

          if [ -s "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" ]; then
            started="$SECONDS"
            rm -f "$AARCH64_LINUX_NIX_IMAGE"
            zstd --sparse -d -f "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" -o "$AARCH64_LINUX_NIX_IMAGE"
            duration="$((SECONDS - started))"
            echo "AARCH64_LINUX_IMAGE_DECOMPRESSED path=$AARCH64_LINUX_NIX_IMAGE archive=$AARCH64_LINUX_NIX_IMAGE_ARCHIVE durationSeconds=$duration"
          else
            started="$SECONDS"
            rm -f "$AARCH64_LINUX_NIX_IMAGE" "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE"
            truncate -s "$AARCH64_LINUX_NIX_IMAGE_SIZE" "$AARCH64_LINUX_NIX_IMAGE"
            mkfs.ext4 -F -m 0 "$AARCH64_LINUX_NIX_IMAGE"
            duration="$((SECONDS - started))"
            echo "AARCH64_LINUX_IMAGE_CREATED path=$AARCH64_LINUX_NIX_IMAGE size=$AARCH64_LINUX_NIX_IMAGE_SIZE fs=ext4 durationSeconds=$duration"
          fi

          ls -lh "$AARCH64_LINUX_NIX_IMAGE" || true
          du -h "$AARCH64_LINUX_NIX_IMAGE" || true
          du -h --apparent-size "$AARCH64_LINUX_NIX_IMAGE" || true

          sudo mkdir -p /nix
          if mountpoint -q /nix; then
            echo "::error ::/nix is already a mountpoint."
            findmnt /nix || true
            exit 1
          fi
          if [ -n "$(sudo find /nix -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "::error ::/nix exists and is not empty before mounting the image."
            sudo ls -la /nix
            exit 1
          fi

          started="$SECONDS"
          if sudo mount -o loop,discard "$AARCH64_LINUX_NIX_IMAGE" /nix; then
            mount_options=loop,discard
          else
            echo "AARCH64_LINUX_IMAGE_MOUNT_DISCARD_UNSUPPORTED fallingBackTo=loop"
            sudo mount -o loop "$AARCH64_LINUX_NIX_IMAGE" /nix
            mount_options=loop
          fi
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_IMAGE_MOUNTED path=$AARCH64_LINUX_NIX_IMAGE mountPoint=/nix options=$mount_options durationSeconds=$duration"

          sudo chown "$USER" /nix
          chmod u+rwx /nix
          df -h /nix

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo hostnamectl set-hostname "$AARCH64_LINUX_RUNNER_HOSTNAME"
          sudo hostname "$AARCH64_LINUX_RUNNER_HOSTNAME"
          hostname

      - name: Build jaeger aarch64-linux toplevel
        shell: bash
        run: |
          set -euo pipefail

          started="$SECONDS"
          nix build \
            --accept-flake-config \
            --print-build-logs \
            --print-out-paths \
            --no-link \
            "$AARCH64_LINUX_NIX_ATTR"
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_BUILD_COMPLETE attr=$AARCH64_LINUX_NIX_ATTR durationSeconds=$duration"

      - name: Report aarch64-linux Nix usage
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if mountpoint -q /nix; then
            df -h /nix
            sudo du -sh /nix /nix/store /nix/var/nix || true
          fi

      - name: Unmount aarch64-linux Nix image
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if mountpoint -q /nix; then
            sync
            started="$SECONDS"
            if sudo umount /nix; then
              :
            else
              sudo umount -l /nix
            fi
            duration="$((SECONDS - started))"
            echo "AARCH64_LINUX_IMAGE_UNMOUNTED path=$AARCH64_LINUX_NIX_IMAGE mountPoint=/nix durationSeconds=$duration"
          fi

  aarch64-linux-cache-writer:
    name: "GitHub aarch64-linux Cache Writer"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 355
    needs: aarch64-linux-cache-readers
    if: ${{ !cancelled() }}
    permissions:
      actions: write
      contents: read
      statuses: read
    concurrency:
      group: hci-agent-runner-github-aarch64-linux
      cancel-in-progress: false
    env:
      AARCH64_LINUX_RUNNER_HOSTNAME: github-aarch64-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.revision || github.sha }}
          persist-credentials: false

      - name: Start aarch64-linux ext4 cache restore
        shell: bash
        run: |
          set -euo pipefail

          image_dir="$RUNNER_TEMP/hci-aarch64-linux-nix-image"
          image="$image_dir/nix-root.ext4"
          archive="$image.zst"

          mkdir -p "$image_dir"

          {
            printf 'AARCH64_LINUX_NIX_IMAGE=%s\n' "$image"
            printf 'AARCH64_LINUX_NIX_IMAGE_ARCHIVE=%s\n' "$archive"
            printf 'AARCH64_LINUX_CACHE_RESTORE_STARTED_AT=%s\n' "$(date +%s)"
          } >> "$GITHUB_ENV"

          df -h

      - name: Restore aarch64-linux ext4 image cache
        id: aarch64-linux-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/hci-aarch64-linux-nix-image/nix-root.ext4.zst
          key: ${{ env.AARCH64_LINUX_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}-writer
          restore-keys: |
            ${{ env.AARCH64_LINUX_CACHE_KEY_PREFIX }}-

      - name: Prepare aarch64-linux Nix image
        shell: bash
        env:
          CACHE_HIT: ${{ steps.aarch64-linux-cache-restore.outputs.cache-hit }}
          CACHE_MATCHED_KEY: ${{ steps.aarch64-linux-cache-restore.outputs.cache-matched-key }}
        run: |
          set -euo pipefail

          restore_duration="$(($(date +%s) - AARCH64_LINUX_CACHE_RESTORE_STARTED_AT))"
          echo "AARCH64_LINUX_CACHE_RESTORE_DONE hit=${CACHE_HIT:-} matchedKey=${CACHE_MATCHED_KEY:-} durationSeconds=$restore_duration"

          for tool in zstd mkfs.ext4 truncate mount df du; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error ::$tool is required for the aarch64-linux ext4 image cache prototype."
              exit 1
            fi
          done

          if [ -s "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" ]; then
            started="$SECONDS"
            rm -f "$AARCH64_LINUX_NIX_IMAGE"
            zstd --sparse -d -f "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" -o "$AARCH64_LINUX_NIX_IMAGE"
            duration="$((SECONDS - started))"
            echo "AARCH64_LINUX_IMAGE_DECOMPRESSED path=$AARCH64_LINUX_NIX_IMAGE archive=$AARCH64_LINUX_NIX_IMAGE_ARCHIVE durationSeconds=$duration"
          else
            started="$SECONDS"
            rm -f "$AARCH64_LINUX_NIX_IMAGE" "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE"
            truncate -s "$AARCH64_LINUX_NIX_IMAGE_SIZE" "$AARCH64_LINUX_NIX_IMAGE"
            mkfs.ext4 -F -m 0 "$AARCH64_LINUX_NIX_IMAGE"
            duration="$((SECONDS - started))"
            echo "AARCH64_LINUX_IMAGE_CREATED path=$AARCH64_LINUX_NIX_IMAGE size=$AARCH64_LINUX_NIX_IMAGE_SIZE fs=ext4 durationSeconds=$duration"
          fi

          ls -lh "$AARCH64_LINUX_NIX_IMAGE" || true
          du -h "$AARCH64_LINUX_NIX_IMAGE" || true
          du -h --apparent-size "$AARCH64_LINUX_NIX_IMAGE" || true

          sudo mkdir -p /nix
          if mountpoint -q /nix; then
            echo "::error ::/nix is already a mountpoint."
            findmnt /nix || true
            exit 1
          fi
          if [ -n "$(sudo find /nix -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "::error ::/nix exists and is not empty before mounting the image."
            sudo ls -la /nix
            exit 1
          fi

          started="$SECONDS"
          if sudo mount -o loop,discard "$AARCH64_LINUX_NIX_IMAGE" /nix; then
            mount_options=loop,discard
          else
            echo "AARCH64_LINUX_IMAGE_MOUNT_DISCARD_UNSUPPORTED fallingBackTo=loop"
            sudo mount -o loop "$AARCH64_LINUX_NIX_IMAGE" /nix
            mount_options=loop
          fi
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_IMAGE_MOUNTED path=$AARCH64_LINUX_NIX_IMAGE mountPoint=/nix options=$mount_options durationSeconds=$duration"

          sudo chown "$USER" /nix
          chmod u+rwx /nix
          df -h /nix

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo hostnamectl set-hostname "$AARCH64_LINUX_RUNNER_HOSTNAME"
          sudo hostname "$AARCH64_LINUX_RUNNER_HOSTNAME"
          hostname

      - name: Build and root jaeger aarch64-linux toplevel
        shell: bash
        run: |
          set -euo pipefail

          out_path_file="$RUNNER_TEMP/aarch64-linux-jaeger-out-path"
          root_dir=/nix/var/nix/gcroots/hci-agent-runner/aarch64-linux

          started="$SECONDS"
          nix build \
            --accept-flake-config \
            --print-build-logs \
            --print-out-paths \
            --no-link \
            "$AARCH64_LINUX_NIX_ATTR" \
            > "$out_path_file"
          duration="$((SECONDS - started))"

          cat "$out_path_file"
          out_path="$(tail -n 1 "$out_path_file")"
          mkdir -p "$root_dir"
          ln -sfn "$out_path" "$root_dir/jaeger"

          echo "AARCH64_LINUX_BUILD_COMPLETE attr=$AARCH64_LINUX_NIX_ATTR outPath=$out_path gcroot=$root_dir/jaeger durationSeconds=$duration"

      - name: Prepare aarch64-linux ext4 cache save
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v e2fsck >/dev/null 2>&1; then
            echo "::error ::e2fsck is required for the aarch64-linux ext4 image cache prototype."
            exit 1
          fi

          df -h /nix
          sudo du -sh /nix /nix/store /nix/var/nix || true

          started="$SECONDS"
          nix store gc
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_STORE_GC_COMPLETE durationSeconds=$duration"

          sudo fstrim -v /nix || true

          started="$SECONDS"
          sync
          if ! sudo umount /nix; then
            echo "::error ::/nix is still busy; refusing to fsck and save a live ext4 image."
            findmnt /nix || true
            sudo fuser -vm /nix || true
            exit 1
          fi
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_IMAGE_UNMOUNTED path=$AARCH64_LINUX_NIX_IMAGE mountPoint=/nix durationSeconds=$duration"

          e2fsck_status=0
          sudo e2fsck -pf "$AARCH64_LINUX_NIX_IMAGE" || e2fsck_status=$?
          if [ "$e2fsck_status" -ne 0 ] && [ "$e2fsck_status" -ne 1 ]; then
            echo "::error ::e2fsck failed with status $e2fsck_status."
            exit "$e2fsck_status"
          fi
          echo "AARCH64_LINUX_IMAGE_FSCK_COMPLETE status=$e2fsck_status"

          started="$SECONDS"
          zstd --sparse -T0 -3 -f "$AARCH64_LINUX_NIX_IMAGE" -o "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE"
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_IMAGE_COMPRESSED path=$AARCH64_LINUX_NIX_IMAGE archive=$AARCH64_LINUX_NIX_IMAGE_ARCHIVE level=3 durationSeconds=$duration"

          ls -lh "$AARCH64_LINUX_NIX_IMAGE" "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" || true
          du -h "$AARCH64_LINUX_NIX_IMAGE" "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" || true
          du -h --apparent-size "$AARCH64_LINUX_NIX_IMAGE" "$AARCH64_LINUX_NIX_IMAGE_ARCHIVE" || true

          echo "AARCH64_LINUX_CACHE_SAVE_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Unmount aarch64-linux Nix image after failure
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if mountpoint -q /nix; then
            sync
            started="$SECONDS"
            if sudo umount /nix; then
              :
            else
              sudo umount -l /nix
            fi
            duration="$((SECONDS - started))"
            echo "AARCH64_LINUX_IMAGE_UNMOUNTED path=$AARCH64_LINUX_NIX_IMAGE mountPoint=/nix durationSeconds=$duration"
          fi

      - name: Save aarch64-linux ext4 image cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/hci-aarch64-linux-nix-image/nix-root.ext4.zst
          key: ${{ env.AARCH64_LINUX_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Report aarch64-linux ext4 cache save
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          save_duration="$(($(date +%s) - AARCH64_LINUX_CACHE_SAVE_STARTED_AT))"
          echo "AARCH64_LINUX_CACHE_UPLOAD_COMPLETE key=$AARCH64_LINUX_CACHE_KEY_PREFIX-${{ github.run_id }}-${{ github.run_attempt }} durationSeconds=$save_duration"

      - name: Prune older aarch64-linux ext4 caches
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_key="${AARCH64_LINUX_CACHE_KEY_PREFIX}-${{ github.run_id }}-${{ github.run_attempt }}"

          gh cache list \
            --repo "$GITHUB_REPOSITORY" \
            --key "$AARCH64_LINUX_CACHE_KEY_PREFIX-" \
            --limit 100 \
            --json id,key,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[1:][] | [.id, .key] | @tsv' \
            | while IFS=$'\t' read -r cache_id cache_key; do
                [ -n "$cache_id" ] || continue
                [ "$cache_key" != "$current_key" ] || continue

                echo "AARCH64_LINUX_CACHE_PRUNE_DELETE id=$cache_id key=$cache_key"
                gh cache delete "$cache_id" --repo "$GITHUB_REPOSITORY"
              done

  aarch64-linux-nixbuild-remote-store:
    name: "GitHub aarch64-linux nixbuild Remote Store"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 355
    env:
      AARCH64_LINUX_RUNNER_HOSTNAME: github-aarch64-linux-3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.revision || github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo hostnamectl set-hostname "$AARCH64_LINUX_RUNNER_HOSTNAME"
          sudo hostname "$AARCH64_LINUX_RUNNER_HOSTNAME"
          hostname

      - name: Configure nixbuild.net
        uses: nixbuild/nixbuild-action@v25
        with:
          nixbuild_token: ${{ secrets.NIXBUILD_TOKEN }}
          settings: |
            caches = cachix://whitestrake
            access-tokens = cachix://whitestrake=WRITE:${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build jaeger aarch64-linux toplevel in nixbuild remote store
        shell: bash
        run: |
          set -euo pipefail

          df -h
          started="$SECONDS"
          nix build \
            --accept-flake-config \
            --print-build-logs \
            --print-out-paths \
            --builders "" \
            --max-jobs 2 \
            --eval-store auto \
            --store ssh-ng://eu.nixbuild.net \
            "$AARCH64_LINUX_NIX_ATTR"
          duration="$((SECONDS - started))"
          echo "AARCH64_LINUX_NIXBUILD_REMOTE_STORE_BUILD_COMPLETE attr=$AARCH64_LINUX_NIX_ATTR store=ssh-ng://eu.nixbuild.net durationSeconds=$duration"

  darwin-agent-namespace:
    name: "Namespace Cache Volume Runner"
    runs-on: namespace-profile-aarch64-darwin
    timeout-minutes: 355
    concurrency:
      group: hci-agent-runner-namespace-aarch64-darwin
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.revision || github.sha }}
          persist-credentials: false

      - name: Prepare Namespace Nix cache root
        shell: bash
        run: |
          set -euo pipefail

          cache_mount=/Volumes/cache
          synthetic_conf=/etc/synthetic.conf

          if [ ! -d "$cache_mount" ]; then
            echo "::error ::Namespace cache volume is not mounted at $cache_mount."
            exit 1
          fi

          cache_device="$(diskutil info -plist "$cache_mount" | plutil -extract DeviceIdentifier raw -)"
          if [ -z "$cache_device" ]; then
            echo "::error ::could not determine Namespace cache volume device."
            exit 1
          fi

          sudo touch "$synthetic_conf"

          if grep -qE '^nix($|[[:space:]])' "$synthetic_conf"; then
            if ! grep -qx 'nix' "$synthetic_conf"; then
              echo "::error ::$synthetic_conf already defines nix differently."
              grep -nE '^nix($|[[:space:]])' "$synthetic_conf" || true
              exit 1
            fi
          else
            printf 'nix\n' | sudo tee -a "$synthetic_conf" >/dev/null
          fi

          if ! sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -B >/dev/null 2>&1; then
            sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t >/dev/null 2>&1 \
              || echo "apfs.util did not report successful synthetic object materialization; validating /nix directly."
          fi

          if [ ! -e /nix ]; then
            echo "::error ::macOS did not materialize synthetic /nix."
            sudo cat "$synthetic_conf"
            exit 1
          fi

          if [ -L /nix ]; then
            echo "::error ::/nix is a symlink; Nix requires /nix to be a real directory or mountpoint."
            ls -ld /nix
            exit 1
          fi

          sudo diskutil unmount "$cache_mount"
          sudo diskutil mount -mountPoint /nix "$cache_device"
          sudo chown "$USER" /nix
          chmod u+rwx /nix

          echo "Mounted Namespace cache volume $cache_device at /nix"

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName namespace-aarch64-darwin
          sudo scutil --set LocalHostName namespace-aarch64-darwin
          sudo hostname namespace-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          GITHUB_TOKEN: ${{ github.token }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh

  darwin-agent-namespace-artifact:
    name: "Namespace Artifact Runner"
    runs-on: namespace-profile-aarch64-darwin-no-cache
    timeout-minutes: 355
    concurrency:
      group: hci-agent-runner-namespace-aarch64-darwin
      cancel-in-progress: false
    env:
      NAMESPACE_ARTIFACT_API_URL: https://ord.storage.namespaceapis.com
      NAMESPACE_NIX_STORE_ARTIFACT: hci-darwin-agent/aarch64-darwin-nix-root.sparsebundle.tar.zst
      NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY: 720h
      NAMESPACE_NIX_STORE_IMAGE_SIZE: 30g
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.revision || github.sha }}
          persist-credentials: false

      - name: Prepare Namespace sparsebundle Nix root
        shell: bash
        env:
          NAMESPACE_BEARER_TOKEN: ${{ secrets.NAMESPACE_BEARER_TOKEN }}
        run: |
          set -euo pipefail

          namespace_bearer_token() {
            local token_file="${NSC_TOKEN_FILE:-/var/run/nsc/token.json}"

            if [ -r "$token_file" ]; then
              plutil -extract bearer_token raw "$token_file"
              return 0
            fi

            if [ -n "${NAMESPACE_BEARER_TOKEN:-}" ]; then
              printf '%s\n' "$NAMESPACE_BEARER_TOKEN"
              return 0
            fi

            return 1
          }

          resolve_artifact_url() {
            local artifact_path="$1"
            local output_path="$2"
            local token
            local request_path

            token="$(namespace_bearer_token)" || return 1
            request_path="$image_parent/resolve-request.json"

            printf '{"path":"%s","namespace":"main"}\n' "$artifact_path" > "$request_path"

            curl --fail --location --show-error --silent \
              --header "Authorization: Bearer $token" \
              --header "Content-Type: application/json" \
              --header "Connect-Protocol-Version: 1" \
              --data-binary @"$request_path" \
              "$NAMESPACE_ARTIFACT_API_URL/namespace.cloud.storage.v1beta.ArtifactsService/ResolveArtifact" \
              > "$output_path"
          }

          synthetic_conf=/etc/synthetic.conf
          image_parent="${RUNNER_TEMP:-${TMPDIR:-/tmp}}/hci-darwin-nix-store"
          image_bundle="$image_parent/nix-root.sparsebundle"
          image_archive="$image_parent/nix-root.sparsebundle.tar.zst"
          resolve_response="$image_parent/resolve-response.json"

          mkdir -p "$image_parent"
          rm -rf "$image_bundle" "$image_archive" "$resolve_response"

          {
            printf 'NAMESPACE_NIX_STORE_IMAGE_BUNDLE=%s\n' "$image_bundle"
            printf 'NAMESPACE_NIX_STORE_IMAGE_ARCHIVE=%s\n' "$image_archive"
          } >> "$GITHUB_ENV"

          if zstd_path="$(command -v zstd 2>/dev/null)"; then
            zstd_version="$("$zstd_path" --version 2>/dev/null || true)"
            echo "NAMESPACE_ARTIFACT_ZSTD_LOCAL available=true path=$zstd_path version=$zstd_version"
          else
            echo "NAMESPACE_ARTIFACT_ZSTD_LOCAL available=false"
            echo "::error ::zstd is required for the Namespace sparsebundle artifact experiment."
            exit 1
          fi

          sudo touch "$synthetic_conf"

          if grep -qE '^nix($|[[:space:]])' "$synthetic_conf"; then
            if ! grep -qx 'nix' "$synthetic_conf"; then
              echo "::error ::$synthetic_conf already defines nix differently."
              grep -nE '^nix($|[[:space:]])' "$synthetic_conf" || true
              exit 1
            fi
          else
            printf 'nix\n' | sudo tee -a "$synthetic_conf" >/dev/null
          fi

          if ! sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -B >/dev/null 2>&1; then
            sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t >/dev/null 2>&1 \
              || echo "apfs.util did not report successful synthetic object materialization; validating /nix directly."
          fi

          if [ ! -e /nix ]; then
            echo "::error ::macOS did not materialize synthetic /nix."
            sudo cat "$synthetic_conf"
            exit 1
          fi

          if [ -L /nix ]; then
            echo "::error ::/nix is a symlink; Nix requires /nix to be a real directory or mountpoint."
            ls -ld /nix
            exit 1
          fi

          started="$SECONDS"
          if resolve_artifact_url "$NAMESPACE_NIX_STORE_ARTIFACT" "$resolve_response"; then
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_IMAGE_RESOLVE_HIT path=$NAMESPACE_NIX_STORE_ARTIFACT durationSeconds=$duration"

            started="$SECONDS"
            signed_download_url="$(plutil -extract signedDownloadUrl raw "$resolve_response")"
            curl --fail --location --show-error --silent "$signed_download_url" \
              | zstd -dc \
              | tar -xpf - -C "$image_parent"
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_IMAGE_RESTORE_STREAMED path=$NAMESPACE_NIX_STORE_ARTIFACT format=sparsebundle-tar compression=zstd durationSeconds=$duration"
          elif command -v nsc >/dev/null 2>&1 && nsc artifact download "$NAMESPACE_NIX_STORE_ARTIFACT" "$image_archive"; then
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_IMAGE_RESTORE_HIT path=$NAMESPACE_NIX_STORE_ARTIFACT durationSeconds=$duration"
            ls -lh "$image_archive"

            started="$SECONDS"
            zstd -dc "$image_archive" | tar -xpf - -C "$image_parent"
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_IMAGE_RESTORE_EXTRACTED path=$NAMESPACE_NIX_STORE_ARTIFACT format=sparsebundle-tar compression=zstd durationSeconds=$duration"
          else
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_IMAGE_RESTORE_MISS path=$NAMESPACE_NIX_STORE_ARTIFACT durationSeconds=$duration"

            started="$SECONDS"
            hdiutil create \
              -size "$NAMESPACE_NIX_STORE_IMAGE_SIZE" \
              -type SPARSEBUNDLE \
              -fs 'Case-sensitive Journaled HFS+' \
              -volname NixStore \
              "$image_bundle"
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_IMAGE_CREATED path=$image_bundle size=$NAMESPACE_NIX_STORE_IMAGE_SIZE fs=case-sensitive-jhfs-plus durationSeconds=$duration"
          fi

          if [ ! -d "$image_bundle" ]; then
            echo "::error ::Namespace Nix sparsebundle is missing at $image_bundle."
            ls -la "$image_parent"
            exit 1
          fi

          started="$SECONDS"
          sudo hdiutil attach \
            -mountpoint /nix \
            -nobrowse \
            "$image_bundle"
          duration="$((SECONDS - started))"
          echo "NAMESPACE_ARTIFACT_IMAGE_ATTACHED path=$image_bundle mountPoint=/nix durationSeconds=$duration"

          sudo chown "$USER" /nix
          chmod u+rwx /nix

          echo "Mounted Namespace sparsebundle $image_bundle at /nix"

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName namespace-artifact-aarch64-darwin
          sudo scutil --set LocalHostName namespace-artifact-aarch64-darwin
          sudo hostname namespace-artifact-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          GITHUB_TOKEN: ${{ github.token }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh

      - name: Save Namespace sparsebundle Nix root artifact
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v nsc >/dev/null 2>&1; then
            echo "::error ::nsc CLI is not available."
            exit 1
          fi

          image_bundle="${NAMESPACE_NIX_STORE_IMAGE_BUNDLE:-${RUNNER_TEMP:-${TMPDIR:-/tmp}}/hci-darwin-nix-store/nix-root.sparsebundle}"
          image_archive="${NAMESPACE_NIX_STORE_IMAGE_ARCHIVE:-${RUNNER_TEMP:-${TMPDIR:-/tmp}}/hci-darwin-nix-store/nix-root.sparsebundle.tar.zst}"
          image_parent="$(dirname "$image_bundle")"

          du -sh /nix /nix/store /nix/var/nix || true

          started="$SECONDS"
          sync
          if sudo hdiutil detach /nix; then
            :
          else
            sudo hdiutil detach -force /nix
          fi
          duration="$((SECONDS - started))"
          echo "NAMESPACE_ARTIFACT_IMAGE_DETACHED path=$image_bundle mountPoint=/nix durationSeconds=$duration"

          if [ ! -d "$image_bundle" ]; then
            echo "::error ::Namespace Nix sparsebundle is missing at $image_bundle."
            ls -la "$image_parent"
            exit 1
          fi

          started="$SECONDS"
          rm -f "$image_archive"
          tar -cpf - -C "$image_parent" "$(basename "$image_bundle")" | zstd -T0 -1 > "$image_archive"
          duration="$((SECONDS - started))"
          echo "NAMESPACE_ARTIFACT_IMAGE_ARCHIVE_CREATED path=$image_archive format=sparsebundle-tar compression=zstd level=1 durationSeconds=$duration"
          ls -lh "$image_archive"

          started="$SECONDS"
          if nsc artifact upload "$image_archive" "$NAMESPACE_NIX_STORE_ARTIFACT" --expires_in "$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY"; then
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_UPLOAD_COMPLETE path=$NAMESPACE_NIX_STORE_ARTIFACT expiresIn=$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY mode=nsc durationSeconds=$duration"
            exit 0
          fi

          echo "Initial artifact upload failed; expiring existing artifact and retrying."
          nsc artifact expire "$NAMESPACE_NIX_STORE_ARTIFACT" || true

          started="$SECONDS"
          nsc artifact upload "$image_archive" "$NAMESPACE_NIX_STORE_ARTIFACT" --expires_in "$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY"
          duration="$((SECONDS - started))"
          echo "NAMESPACE_ARTIFACT_UPLOAD_COMPLETE path=$NAMESPACE_NIX_STORE_ARTIFACT expiresIn=$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY mode=nsc durationSeconds=$duration"
