name: "Packages: check for updates"
on:
  workflow_dispatch:
    inputs:
      package:
        description: "Single package to update (leave empty for all)"
        required: false
        type: string
  schedule:
    - cron: "0 12 * * *" # Daily at 12:00 UTC
permissions:
  contents: read
jobs:
  detect-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - id: set-matrix
        run: |
          # shellcheck disable=SC2016
          if [ -n "$PACKAGE" ]; then
            PACKAGES=$(jq -cn --arg p "$PACKAGE" '[$p]')
          else
            PACKAGES="$(nix eval --json '.#updatablePackages' --accept-flake-config)"
          fi
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

          COUNT="$(jq 'length' <<< "$PACKAGES")"
          echo "has_packages=$([[ "$COUNT" -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        env:
          PACKAGE: ${{ inputs.package }}
  update-package:
    needs: detect-packages
    if: needs.detect-packages.outputs.has_packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Run nix-update
        id: update
        run: |
          OLD_VERSION=$(nix eval --raw ".#${{ matrix.package }}.version" --accept-flake-config)

          nix run nixpkgs#nix-update -- \
            --flake \
            --use-update-script \
            "${{ matrix.package }}"

          NEW_VERSION=$(nix eval --raw ".#${{ matrix.package }}.version" --accept-flake-config)

          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
              echo "title_suffix= to $NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "body_details=Bumps version from \`$OLD_VERSION\` to \`$NEW_VERSION\`." >> "$GITHUB_OUTPUT"
            else
              echo "title_suffix= (dependencies)" >> "$GITHUB_OUTPUT"
              echo "body_details=Bumps internal dependencies or plugins (version remains at \`$NEW_VERSION\`)." >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Format files
        if: steps.update.outputs.changed == 'true'
        run: |
          nix fmt
      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: nix-update/${{ matrix.package }}
          title: "chore(pkgs): update ${{ matrix.package }}${{ steps.update.outputs.title_suffix }}"
          body: |
            Automated update of `${{ matrix.package }}` via `nix-update`.

            ${{ steps.update.outputs.body_details }}

            ---
            _This PR was created automatically by the package update workflow._
          labels: |
            dependencies
            automated
          commit-message: "chore(pkgs): update ${{ matrix.package }}${{ steps.update.outputs.title_suffix }}"
          delete-branch: true
