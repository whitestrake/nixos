name: "HCI Darwin Agent"
run-name: "HCI Darwin Agent"

on:
  push:
  workflow_dispatch:
    inputs:
      revision:
        description: "Git revision to monitor in Hercules CI. Defaults to this workflow run revision."
        required: false
        default: ""
        type: string
      hci_job_id:
        description: "Optional Hercules CI job id to monitor instead of discovering by revision."
        required: false
        default: ""
        type: string

concurrency:
  group: hci-darwin-agent
  cancel-in-progress: false

permissions:
  contents: read
  statuses: read

jobs:
  darwin-agent:
    name: "Run ephemeral Darwin HCI agent"
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName github-actions-aarch64-darwin
          sudo scutil --set LocalHostName github-actions-aarch64-darwin
          sudo hostname github-actions-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          GITHUB_TOKEN: ${{ github.token }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_JOB_ID: ${{ inputs.hci_job_id || '' }}
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          nix shell \
            --accept-flake-config \
            --inputs-from . \
            nixpkgs#curl \
            nixpkgs#hercules-ci-agent \
            nixpkgs#jq \
            -c bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh

  darwin-agent-namespace:
    name: "Run ephemeral Darwin HCI agent on Namespace"
    runs-on: namespace-profile-aarch64-darwin
    timeout-minutes: 355
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Prepare Namespace Nix cache root
        shell: bash
        run: |
          set -euo pipefail

          cache_mount=/Volumes/cache
          synthetic_conf=/etc/synthetic.conf

          if [ ! -d "$cache_mount" ]; then
            echo "::error ::Namespace cache volume is not mounted at $cache_mount."
            exit 1
          fi

          cache_device="$(diskutil info -plist "$cache_mount" | plutil -extract DeviceIdentifier raw -)"
          if [ -z "$cache_device" ]; then
            echo "::error ::could not determine Namespace cache volume device."
            exit 1
          fi

          sudo touch "$synthetic_conf"

          if grep -qE '^nix($|[[:space:]])' "$synthetic_conf"; then
            if ! grep -qx 'nix' "$synthetic_conf"; then
              echo "::error ::$synthetic_conf already defines nix differently."
              grep -nE '^nix($|[[:space:]])' "$synthetic_conf" || true
              exit 1
            fi
          else
            printf 'nix\n' | sudo tee -a "$synthetic_conf" >/dev/null
          fi

          if ! sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -B >/dev/null 2>&1; then
            sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t >/dev/null 2>&1 \
              || echo "apfs.util did not report successful synthetic object materialization; validating /nix directly."
          fi

          if [ ! -e /nix ]; then
            echo "::error ::macOS did not materialize synthetic /nix."
            sudo cat "$synthetic_conf"
            exit 1
          fi

          if [ -L /nix ]; then
            echo "::error ::/nix is a symlink; Nix requires /nix to be a real directory or mountpoint."
            ls -ld /nix
            exit 1
          fi

          sudo diskutil unmount "$cache_mount"
          sudo diskutil mount -mountPoint /nix "$cache_device"
          sudo chown "$USER" /nix
          chmod u+rwx /nix

          echo "Mounted Namespace cache volume $cache_device at /nix"

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName namespace-aarch64-darwin
          sudo scutil --set LocalHostName namespace-aarch64-darwin
          sudo hostname namespace-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          GITHUB_TOKEN: ${{ github.token }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_JOB_ID: ${{ inputs.hci_job_id || '' }}
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          nix shell \
            --accept-flake-config \
            --inputs-from . \
            nixpkgs#curl \
            nixpkgs#hercules-ci-agent \
            nixpkgs#jq \
            -c bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh

  darwin-agent-namespace-artifact:
    name: "Run ephemeral Darwin HCI agent on Namespace with artifact store"
    runs-on: namespace-profile-aarch64-darwin-no-cache
    timeout-minutes: 355
    env:
      NAMESPACE_NIX_STORE_ARTIFACT: hci-darwin-agent/aarch64-darwin-nix-store.tar.zst
      NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY: 720h
      NAMESPACE_NIX_STORE_IMAGE_SIZE: 30g
      NAMESPACE_NIX_STORE_LEGACY_ARTIFACT: hci-darwin-agent/aarch64-darwin-nix-store.tar
      NAMESPACE_NIX_STORE_ZSTD_LEVEL: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Prepare Namespace artifact Nix root
        shell: bash
        run: |
          set -euo pipefail

          synthetic_conf=/etc/synthetic.conf
          image_dir="$(mktemp -d "${TMPDIR:-/tmp}/hci-darwin-nix-root.XXXXXX")"
          image_path="$image_dir/nix-root.sparseimage"

          sudo touch "$synthetic_conf"

          if grep -qE '^nix($|[[:space:]])' "$synthetic_conf"; then
            if ! grep -qx 'nix' "$synthetic_conf"; then
              echo "::error ::$synthetic_conf already defines nix differently."
              grep -nE '^nix($|[[:space:]])' "$synthetic_conf" || true
              exit 1
            fi
          else
            printf 'nix\n' | sudo tee -a "$synthetic_conf" >/dev/null
          fi

          if ! sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -B >/dev/null 2>&1; then
            sudo /System/Library/Filesystems/apfs.fs/Contents/Resources/apfs.util -t >/dev/null 2>&1 \
              || echo "apfs.util did not report successful synthetic object materialization; validating /nix directly."
          fi

          if [ ! -e /nix ]; then
            echo "::error ::macOS did not materialize synthetic /nix."
            sudo cat "$synthetic_conf"
            exit 1
          fi

          if [ -L /nix ]; then
            echo "::error ::/nix is a symlink; Nix requires /nix to be a real directory or mountpoint."
            ls -ld /nix
            exit 1
          fi

          hdiutil create \
            -size "$NAMESPACE_NIX_STORE_IMAGE_SIZE" \
            -type SPARSE \
            -fs APFS \
            -volname NixStore \
            "$image_path"

          sudo hdiutil attach \
            -mountpoint /nix \
            -nobrowse \
            "$image_path"

          sudo chown "$USER" /nix
          chmod u+rwx /nix

          echo "Mounted ephemeral APFS image $image_path at /nix for Namespace artifact store"

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Restore Namespace Nix store artifact
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v nsc >/dev/null 2>&1; then
            echo "::error ::nsc CLI is not available on this Namespace runner."
            exit 1
          fi

          artifact_dir="$(mktemp -d "${TMPDIR:-/tmp}/hci-darwin-nix-store.XXXXXX")"
          artifact_archive="$artifact_dir/nix-store.tar.zst"
          legacy_archive="$artifact_dir/nix-store.tar"
          started="$SECONDS"

          if nsc artifact download "$NAMESPACE_NIX_STORE_ARTIFACT" "$artifact_archive"; then
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_RESTORE_HIT path=$NAMESPACE_NIX_STORE_ARTIFACT durationSeconds=$duration"
            ls -lh "$artifact_archive"

            started="$SECONDS"
            nix run --accept-flake-config --inputs-from . nixpkgs#zstd -- -dc "$artifact_archive" | sudo tar -xpf - -C /
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_RESTORE_EXTRACTED path=$NAMESPACE_NIX_STORE_ARTIFACT compression=zstd durationSeconds=$duration"

            sudo chown "$USER" /nix
            chmod u+rwx /nix
          elif nsc artifact download "$NAMESPACE_NIX_STORE_LEGACY_ARTIFACT" "$legacy_archive"; then
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_RESTORE_LEGACY_HIT path=$NAMESPACE_NIX_STORE_LEGACY_ARTIFACT durationSeconds=$duration"
            ls -lh "$legacy_archive"

            started="$SECONDS"
            sudo tar -xpf "$legacy_archive" -C /
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_RESTORE_EXTRACTED path=$NAMESPACE_NIX_STORE_LEGACY_ARTIFACT compression=none durationSeconds=$duration"

            sudo chown "$USER" /nix
            chmod u+rwx /nix
          else
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_RESTORE_MISS path=$NAMESPACE_NIX_STORE_ARTIFACT durationSeconds=$duration"
          fi

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName namespace-artifact-aarch64-darwin
          sudo scutil --set LocalHostName namespace-artifact-aarch64-darwin
          sudo hostname namespace-artifact-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          GITHUB_TOKEN: ${{ github.token }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_JOB_ID: ${{ inputs.hci_job_id || '' }}
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          nix shell \
            --accept-flake-config \
            --inputs-from . \
            nixpkgs#curl \
            nixpkgs#hercules-ci-agent \
            nixpkgs#jq \
            -c bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh

      - name: Save Namespace Nix store artifact
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v nsc >/dev/null 2>&1; then
            echo "::error ::nsc CLI is not available on this Namespace runner."
            exit 1
          fi

          artifact_dir="$(mktemp -d "${TMPDIR:-/tmp}/hci-darwin-nix-store.XXXXXX")"
          artifact_archive="$artifact_dir/nix-store.tar.zst"
          zstd_level="-${NAMESPACE_NIX_STORE_ZSTD_LEVEL}"

          du -sh /nix /nix/store /nix/var/nix || true

          started="$SECONDS"
          sudo tar -cpf - -C / nix | nix run --accept-flake-config --inputs-from . nixpkgs#zstd -- "$zstd_level" -T0 -c > "$artifact_archive"
          duration="$((SECONDS - started))"
          echo "NAMESPACE_ARTIFACT_ARCHIVE_CREATED path=$artifact_archive compression=zstd level=$NAMESPACE_NIX_STORE_ZSTD_LEVEL durationSeconds=$duration"
          ls -lh "$artifact_archive"

          started="$SECONDS"
          if nsc artifact upload "$artifact_archive" "$NAMESPACE_NIX_STORE_ARTIFACT" --expires_in "$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY"; then
            duration="$((SECONDS - started))"
            echo "NAMESPACE_ARTIFACT_UPLOAD_COMPLETE path=$NAMESPACE_NIX_STORE_ARTIFACT expiresIn=$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY durationSeconds=$duration"
            exit 0
          fi

          echo "Initial artifact upload failed; expiring existing artifact and retrying."
          nsc artifact expire "$NAMESPACE_NIX_STORE_ARTIFACT" || true

          started="$SECONDS"
          nsc artifact upload "$artifact_archive" "$NAMESPACE_NIX_STORE_ARTIFACT" --expires_in "$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY"
          duration="$((SECONDS - started))"
          echo "NAMESPACE_ARTIFACT_UPLOAD_COMPLETE path=$NAMESPACE_NIX_STORE_ARTIFACT expiresIn=$NAMESPACE_NIX_STORE_ARTIFACT_EXPIRY durationSeconds=$duration"
