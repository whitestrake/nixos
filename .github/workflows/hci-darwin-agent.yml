name: "HCI Darwin Agent"
run-name: "HCI Darwin Agent"

on:
  push:
  workflow_dispatch:
    inputs:
      revision:
        description: "Git revision to monitor in Hercules CI. Defaults to this workflow run revision."
        required: false
        default: ""
        type: string
      hci_job_id:
        description: "Optional Hercules CI job id to monitor instead of discovering by revision."
        required: false
        default: ""
        type: string

concurrency:
  group: hci-darwin-agent
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  darwin-agent:
    name: "Run ephemeral Darwin HCI agent"
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Restore rolling Darwin Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-darwin-andred-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-prefixes-first-match: |
            nix-darwin-andred-${{ github.ref_name }}-
            nix-darwin-andred-master-
          gc-max-store-size-macos: 0
          purge: true
          purge-prefixes: |
            nix-darwin-andred-
          purge-last-accessed: P1D
          purge-primary-key: never

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName github-actions-aarch64-darwin
          sudo scutil --set LocalHostName github-actions-aarch64-darwin
          sudo hostname github-actions-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          HERCULES_CI_AGENT_SESSION_KEY_B64: ${{ secrets.HERCULES_CI_AGENT_SESSION_KEY_B64 }}
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_JOB_ID: ${{ inputs.hci_job_id || '' }}
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          nix shell \
            --accept-flake-config \
            --inputs-from . \
            nixpkgs#curl \
            nixpkgs#hercules-ci-agent \
            nixpkgs#jq \
            -c bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh

  darwin-agent-no-cache-no-session:
    name: "Run ephemeral Darwin HCI agent without GHA cache or session key"
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: ./.github/actions/install-nix
        with:
          extra-nix-conf: |
            narinfo-cache-negative-ttl = 0
            max-jobs = auto

      - name: Set HCI agent hostname
        shell: bash
        run: |
          set -euo pipefail

          sudo scutil --set HostName github-actions-aarch64-darwin
          sudo scutil --set LocalHostName github-actions-aarch64-darwin
          sudo hostname github-actions-aarch64-darwin

      - name: Run ephemeral Hercules CI Darwin agent without session key
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_CACHE_NAME: whitestrake
          DARWIN_CONFIGURATION: andred
          HERCULES_CI_CLUSTER_JOIN_TOKEN: ${{ secrets.HERCULES_CI_CLUSTER_JOIN_TOKEN }}
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_DARWIN_FINISH_CONDITION: hci-job-done
          HCI_DARWIN_TIMEOUT_SECONDS: "18000"
          HCI_JOB_ID: ${{ inputs.hci_job_id || '' }}
          HCI_PROJECT: github/whitestrake/nixos
          HCI_REVISION: ${{ inputs.revision || github.sha }}
        run: |
          set -euo pipefail

          nix shell \
            --accept-flake-config \
            --inputs-from . \
            nixpkgs#curl \
            nixpkgs#hercules-ci-agent \
            nixpkgs#jq \
            -c bash modules/deployment/scripts/hci-darwin-agent-supervisor.sh
