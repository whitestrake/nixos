name: "Cachix CI/CD"
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
    && format(
      'Manual Cachix CI/CD: {0} {1}',
      inputs.mode,
      inputs.host != '' && inputs.host || 'all hosts'
    )
    || github.event_name == 'pull_request'
    && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title)
    || github.event.head_commit.message
    || github.workflow
  }}
on:
  push:
    # Docs-only changes cannot affect Nix evaluation, deploy scripts, modules,
    # secrets/templates, lockfiles, or workflow behaviour, so they skip CI entirely.
    # When every changed path matches, the whole workflow is skipped and no deploy
    # can occur by construction. Scope is intentionally narrow: only the docs dir and
    # top-level Markdown (NOT '**/*.md', which could match Markdown inside modules/).
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      host:
        description: "Optional host to build/deploy. Empty means all eligible hosts."
        required: false
        default: ""
        type: string
      mode:
        description: "Manual CI/CD mode."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - build
          - deploy
          - build/deploy
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  plan:
    name: "Plan (build/deploy matrix)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build_matrix: ${{ steps.eval.outputs.build_matrix }}
      deploy_matrix: ${{ steps.eval.outputs.deploy_matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - id: eval
        name: Enumerate and filter configurations
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_PERSONAL_TOKEN: ${{ secrets.CACHIX_PERSONAL_TOKEN }}
          IS_PRODUCTION: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) }}
          MANUAL_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode == 'build' || inputs.mode == 'build/deploy') || false }}
          FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && (inputs.mode == 'deploy' || inputs.mode == 'build/deploy') || false }}
          ALLOW_DEPLOY: ${{ github.event_name != 'workflow_dispatch' || inputs.mode != 'build' }}
          TARGET_HOST: ${{ github.event_name == 'workflow_dispatch' && inputs.host || '' }}
        run: |
          # shellcheck disable=SC2016
          phase_start() {
            PHASE_NAME="$1"
            PHASE_TS="$(date +%s%3N)"
            echo "::group::phase: ${PHASE_NAME}"
            echo "phase_start_ms=${PHASE_TS}"
          }
          phase_end() {
            local end
            end="$(date +%s%3N)"
            echo "phase_end_ms=${end}"
            if [[ -n "${PHASE_TS:-}" ]]; then
              local duration=$(( end - PHASE_TS ))
              echo "phase_duration_ms=${duration}"
            fi
            echo "::endgroup::"
          }
          phase_start "job_script"
          phase_start "nix_eval"
          # 1. Run a single bulk evaluation for all configurations
          # shellcheck disable=SC2016
          ALL_HOSTS=$(nix eval --json --impure --expr '
            let
              self = builtins.getFlake (toString ./.);

              runner = sys:
                if sys == "x86_64-linux" then "ubuntu-latest"
                else if sys == "aarch64-linux" then "ubuntu-24.04-arm"
                else if sys == "aarch64-darwin" then "macos-latest"
                else "ubuntu-latest";

              nixosItems = builtins.mapAttrs (name: cfg: let
                sys = cfg.pkgs.stdenv.hostPlatform.system;
                path = "nixosConfigurations.${name}.config.system.build.toplevel";
                isCachixDeployTarget = cfg.config.services.cachix-agent.enable or false;
                rollbackScript = if isCachixDeployTarget && self.packages.${sys} ? deploy-health-rollback-script
                  then self.packages.${sys}.deploy-health-rollback-script.outPath
                  else "";
              in {
                host = name;
                inherit path;
                name = "${path} (${sys})";
                system = sys;
                runner = runner sys;
                storePath = cfg.config.system.build.toplevel.outPath;
                isCachixDeployTarget = isCachixDeployTarget;
                rollbackScript = rollbackScript;
              }) (self.nixosConfigurations or {});

              darwinItems = builtins.mapAttrs (name: cfg: let
                sys = cfg.pkgs.stdenv.hostPlatform.system;
                path = "darwinConfigurations.${name}.system";
              in {
                host = name;
                inherit path;
                name = "${path} (${sys})";
                system = sys;
                runner = runner sys;
                storePath = cfg.system.outPath;
              }) (self.darwinConfigurations or {});
            in
              builtins.attrValues nixosItems ++ builtins.attrValues darwinItems
          ' --accept-flake-config)
          phase_end # nix_eval

          phase_start "cachix_pin_fetch"
          # 2. Fetch current pins from Cachix API
          CURRENT_PINS="$(
            curl -fsS -H "Authorization: Bearer ${CACHIX_AUTH_TOKEN}" \
              "https://app.cachix.org/api/v1/cache/whitestrake/pin" \
            | jq -e 'if type == "array" then . else empty end' \
            || {
              echo "::warning::Failed to fetch a valid Cachix pin list; treating pins as empty." >&2
              echo "[]"
            }
          )"
          phase_end # cachix_pin_fetch

          # 3. Manual dispatch mode maps to force/suppress behaviour.
          MANUAL_MODE="${MANUAL_MODE:-auto}"
          FORCE_BUILD="${FORCE_BUILD:-false}"
          FORCE_DEPLOY="${FORCE_DEPLOY:-false}"
          ALLOW_DEPLOY="${ALLOW_DEPLOY:-true}"
          TARGET_HOST="${TARGET_HOST:-}"

          # 4. Probe Cachix deploy agents, but ONLY for hosts where a deployment could
          #    actually occur: deploy-capable (isCachixDeployTarget) AND (config changed
          #    vs. deployed pin OR forced). If no such candidate exists, skip probing entirely
          #    since no deployment can happen by construction.
          REGISTERED_HOSTS="[]"
          if [[ "$IS_PRODUCTION" == "true" && "$ALLOW_DEPLOY" == "true" && -n "$CACHIX_PERSONAL_TOKEN" ]]; then
            # Compute the deploy-candidate host set with the same predicate used by the
            # deploy matrix filter below (minus the registration check we are about to do).
            CANDIDATE_HOSTS=$(jq -r \
              --argjson pins "$CURRENT_PINS" \
              --arg force "$FORCE_DEPLOY" \
              --arg target "$TARGET_HOST" \
              '
                def pinPath($name):
                  (($pins[] | select(.name == $name) | .lastRevision.storePath) // "");
                def effectivePin($primary; $legacy):
                  pinPath($primary) as $p | if $p != "" then $p else pinPath($legacy) end;

                .[]
                 | select(.isCachixDeployTarget == true)
                 | select($target == "" or .host == $target)
                 | . as $item
                 | effectivePin("deployed-host-" + $item.host; "host-" + $item.host) as $deployed
                 | select($force == "true" or $item.storePath != $deployed)
                 | .host' <<< "$ALL_HOSTS")

            if [[ -n "$CANDIDATE_HOSTS" ]]; then
              # Probe candidates in parallel with bounded concurrency. Each probe writes a
              # single deterministic "host status" line; we sort the collected results so
              # output is stable regardless of completion order, then collect the 200s.
              probe_agent() {
                local host="$1"
                local code
                code=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $CACHIX_PERSONAL_TOKEN" \
                  "https://cachix.org/api/v1/deploy/agent/whitestrake/$host" || echo "000")
                printf '%s %s\n' "$host" "$code"
              }
              export -f probe_agent
              export CACHIX_PERSONAL_TOKEN

              PROBE_RESULTS=$(printf '%s\n' "$CANDIDATE_HOSTS" \
                | xargs -P 8 -I {} bash -c 'probe_agent "$@"' _ {} \
                | sort)

              echo "::group::Cachix Agent Probe Results"
              echo "$PROBE_RESULTS"
              echo "::endgroup::"

              while read -r host code; do
                [[ -z "$host" ]] && continue
                if [[ "$code" == "200" ]]; then
                  REGISTERED_HOSTS=$(jq -c --arg h "$host" '. + [$h]' <<< "$REGISTERED_HOSTS")
                else
                  echo "Agent for '$host' not registered/reachable (HTTP $code); will not deploy."
                fi
              done <<< "$PROBE_RESULTS"
            else
              echo "No deploy-capable host changed (or forced); skipping Cachix agent probing."
            fi
          elif [[ "$ALLOW_DEPLOY" != "true" ]]; then
            echo "Manual mode suppresses deployments; skipping Cachix agent probing."
          fi

          phase_start "matrix_construction"
          # 5. Filter build matrix dynamically (storePath differs from built state OR forced build).
          BUILD_MATRIX=$(jq -c \
            --argjson pins "$CURRENT_PINS" \
            --arg force "$FORCE_BUILD" \
            --arg target "$TARGET_HOST" \
            '
              def pinPath($name):
                (($pins[] | select(.name == $name) | .lastRevision.storePath) // "");
              def effectivePin($primary; $legacy):
                pinPath($primary) as $p | if $p != "" then $p else pinPath($legacy) end;

              map(
              select($target == "" or .host == $target) |
              . as $item |
              effectivePin("built-host-" + $item.host; "host-" + $item.host) as $built |
              if ($force == "true" or $item.storePath != $built) then $item else empty end
            )' <<< "$ALL_HOSTS")

          # 6. Filter deploy matrix dynamically (host is registered AND deployed state differs OR forced deploy).
          DEPLOY_MATRIX=$(jq -c \
            --argjson pins "$CURRENT_PINS" \
            --arg force "$FORCE_DEPLOY" \
            --arg target "$TARGET_HOST" \
            --argjson registered "$REGISTERED_HOSTS" \
            '
              def pinPath($name):
                (($pins[] | select(.name == $name) | .lastRevision.storePath) // "");
              def effectivePin($primary; $legacy):
                pinPath($primary) as $p | if $p != "" then $p else pinPath($legacy) end;

              map(
              select($target == "" or .host == $target) |
              . as $item |
              effectivePin("deployed-host-" + $item.host; "host-" + $item.host) as $deployed |
              if (any($registered[]; . == $item.host) and ($force == "true" or $item.storePath != $deployed)) then $item else empty end
            )' <<< "$ALL_HOSTS")

          phase_end # matrix_construction
          # 7. Debug output grouping
          echo "::group::Raw Flake Evaluation Output"
          echo "$ALL_HOSTS" | jq .
          echo "::endgroup::"

          echo "::group::Raw Cachix Pins Output"
          echo "$CURRENT_PINS" | jq .
          echo "::endgroup::"

          echo "::group::Detailed Filtering Trace"
          pin_path() {
            jq -r --arg name "$1" 'map(select(.name == $name))[0].lastRevision.storePath // ""' <<< "$CURRENT_PINS"
          }

          for host in $(echo "$ALL_HOSTS" | jq -r '.[] | .host'); do
            item=$(echo "$ALL_HOSTS" | jq -r --arg h "$host" '.[] | select(.host == $h)')
            store_path=$(echo "$item" | jq -r '.storePath')
            legacy_path=$(pin_path "host-$host")
            built_path=$(pin_path "built-host-$host")
            deployed_path=$(pin_path "deployed-host-$host")
            effective_built_path="$built_path"
            effective_deployed_path="$deployed_path"
            if [[ -z "$effective_built_path" ]]; then
              effective_built_path="$legacy_path"
            fi
            if [[ -z "$effective_deployed_path" ]]; then
              effective_deployed_path="$legacy_path"
            fi

            echo "[$host]:"
            echo "  - Local System Store Path:  $store_path"
            if [[ -n "$legacy_path" ]]; then
              echo "  - Legacy Host Pin:          $legacy_path"
            else
              echo "  - Legacy Host Pin:          [NOT FOUND]"
            fi
            if [[ -n "$built_path" ]]; then
              echo "  - Built Host Pin:           $built_path"
            elif [[ -n "$legacy_path" ]]; then
              echo "  - Built Host Pin:           [FALLBACK TO LEGACY]"
            else
              echo "  - Built Host Pin:           [NOT FOUND]"
            fi
            if [[ -n "$deployed_path" ]]; then
              echo "  - Deployed Host Pin:        $deployed_path"
            elif [[ -n "$legacy_path" ]]; then
              echo "  - Deployed Host Pin:        [FALLBACK TO LEGACY]"
            else
              echo "  - Deployed Host Pin:        [NOT FOUND]"
            fi

            if [[ "$FORCE_BUILD" == "true" ]]; then
              echo "  - Build Decision: QUEUE BUILD (Build forced)"
            elif [[ "$store_path" != "$effective_built_path" ]]; then
              echo "  - Build Decision: QUEUE BUILD (Mismatch or not built)"
            else
              echo "  - Build Decision: SKIP BUILD (Built state identical)"
            fi

            is_deploy_target=$(echo "$item" | jq -r '.isCachixDeployTarget // false')
            if [[ "$ALLOW_DEPLOY" != "true" ]]; then
              echo "  - Deploy Decision: SKIP DEPLOY (Manual mode suppresses deploy)"
            elif jq -e --arg h "$host" 'any(. == $h)' <<< "$REGISTERED_HOSTS" > /dev/null; then
              if [[ "$FORCE_DEPLOY" == "true" ]]; then
                echo "  - Deploy Decision: QUEUE DEPLOY (Deploy forced)"
              elif [[ "$store_path" != "$effective_deployed_path" ]]; then
                echo "  - Deploy Decision: QUEUE DEPLOY (Agent registered & deployed state stale)"
              else
                echo "  - Deploy Decision: SKIP DEPLOY (Deployed state identical)"
              fi
            elif [[ "$is_deploy_target" != "true" ]]; then
              echo "  - Deploy Decision: SKIP DEPLOY (Host is not a Cachix deploy target)"
            elif [[ "$FORCE_DEPLOY" != "true" && "$store_path" == "$effective_deployed_path" ]]; then
              echo "  - Deploy Decision: SKIP DEPLOY (Deployed state identical; agent not probed)"
            else
              echo "  - Deploy Decision: SKIP DEPLOY (Cachix deploy agent not registered/reachable)"
            fi
          done
          echo "::endgroup::"

          phase_start "github_output_writing"
          # 8. Output single-line JSON matrices safely to GHA
          echo "build_matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"
          echo "deploy_matrix=$DEPLOY_MATRIX" >> "$GITHUB_OUTPUT"
          phase_end # github_output_writing
          phase_end # job_script

          BUILD_COUNT=$(echo "$BUILD_MATRIX" | jq length)
          DEPLOY_COUNT=$(echo "$DEPLOY_MATRIX" | jq length)
          TOTAL_HOSTS=$(echo "$ALL_HOSTS" | jq length)
          PINNED_COUNT=$(echo "$CURRENT_PINS" | jq length)
          SKIPPED_BUILD_COUNT=$((TOTAL_HOSTS - BUILD_COUNT))

          echo "::group::Evaluate Summary"
          echo "Branch/Ref evaluated: ${{ github.ref_name }}"
          echo "Manual mode: $MANUAL_MODE"
          echo "Force build status: $FORCE_BUILD"
          echo "Force deploy status: $FORCE_DEPLOY"
          echo "Allow deploy status: $ALLOW_DEPLOY"
          echo "Total hosts evaluated: $TOTAL_HOSTS"
          echo "Cachix pins fetched: $PINNED_COUNT"
          echo "Build matrix count: $BUILD_COUNT"
          echo "Skipped build count: $SKIPPED_BUILD_COUNT"
          echo "Deploy matrix count: $DEPLOY_COUNT"
          echo "::endgroup::"
  validate-flake:
    name: "Validate (flake eval)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - name: Force-evaluate all non-IFD flake outputs
        shell: bash
        # Force-evaluate every non-IFD flake output to a .drvPath. This builds
        # nothing and needs NO substituters/cachix — only the locked flake inputs —
        # so it cannot race the jobs that push to whitestrake.cachix.org, and fails
        # fast (~1 min) if the flake does not evaluate. The IFD-backed deploy checks
        # (deploy-schema, deploy-schema-fast, deploy-activate) are intentionally
        # excluded: they are built and run natively per-system by validate-deploy.
        # Reproduce locally with: nix eval --raw --impure --no-substitute --expr '...'
        run: |
          set -euo pipefail
          # Resolve to an absolute path so getFlake accepts it (a bare "." is invalid in a Nix expr).
          FLAKE="$(realpath .)"
          nix eval --raw --impure --no-substitute --expr '
          let
            flake = builtins.getFlake "'"$FLAKE"'";
            lib   = flake.inputs.nixpkgs.lib;
            isDrv = x: (x.type or null) == "derivation";
            # IFD checks intentionally excluded (covered by validate-deploy):
            ifd   = [ "deploy-schema" "deploy-schema-fast" "deploy-activate" ];
            force = d: builtins.seq d.drvPath d.drvPath;

            forceConfigs = set:
              lib.concatStringsSep "" (lib.mapAttrsToList
                (_: cfg: force cfg.config.system.build.toplevel) set);

            forceSysSet = set:                       # packages / devShells: { sys = { name = drv; } }
              lib.concatStringsSep "" (lib.mapAttrsToList
                (_: s: lib.concatStringsSep "" (lib.mapAttrsToList
                  (_: force) (lib.filterAttrs (_: isDrv) s))) set);

            forceChecks = set:                       # checks minus IFD names
              lib.concatStringsSep "" (lib.mapAttrsToList
                (_: cks: lib.concatStringsSep "" (lib.mapAttrsToList
                  (_: force) (lib.filterAttrs (n: v: isDrv v && !(builtins.elem n ifd)) cks))) set);

            parts = [
              (forceConfigs (flake.outputs.nixosConfigurations  or {}))
              (forceConfigs (flake.outputs.darwinConfigurations or {}))
              (forceSysSet  (flake.outputs.packages   or {}))
              (forceSysSet  (flake.outputs.devShells  or {}))
              (forceChecks  (flake.outputs.checks     or {}))
            ];
          in builtins.deepSeq parts "ok"
          '
          echo "validate-flake: ok"
  build:
    needs: [plan]
    if: ${{ needs.plan.outputs.build_matrix != '[]' && needs.plan.outputs.build_matrix != '' }}
    name: "Build - ${{ matrix.host }} ${{ matrix.system }}: ${{ matrix.path }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: |
          nix build '.#${{ matrix.path }}' --print-build-logs
          if [[ "${{ matrix.isCachixDeployTarget }}" == "true" && -n "${{ matrix.rollbackScript }}" ]]; then
            echo "Building rollback script..."
            nix build ".#packages.${{ matrix.system }}.deploy-health-rollback-script" --no-link --print-build-logs
          fi
      - name: Push and Pin Built System to Cachix
        if: |
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (startsWith(matrix.path, 'nixosConfigurations.') || startsWith(matrix.path, 'darwinConfigurations.'))
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          STORE_PATH=$(readlink -f result)
          echo "Pushing $STORE_PATH to Cachix..."
          cachix push whitestrake "$STORE_PATH"
          if [[ "${{ matrix.isCachixDeployTarget }}" == "true" && -n "${{ matrix.rollbackScript }}" ]]; then
            echo "Pushing rollback script ${{ matrix.rollbackScript }} to Cachix..."
            cachix push whitestrake "${{ matrix.rollbackScript }}"
          fi
          echo "Pinning built state for ${{ matrix.host }} ($STORE_PATH) to Cachix..."
          cachix pin whitestrake "built-host-${{ matrix.host }}" "$STORE_PATH"
  deploy:
    needs: [build, plan, validate-deploy, validate-flake]
    # Execute only on workflow_dispatch or pushes to the default branch,
    # and only if there are deployable hosts, builds did not fail/cancel, and validation succeeded.
    if: >-
      always()
      && (github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push'
              && github.ref_name == github.event.repository.default_branch))
      && needs.plan.outputs.deploy_matrix != '[]'
      && needs.plan.outputs.deploy_matrix != ''
      && (needs.build.result == 'success'
          || (needs.build.result == 'skipped'
              && needs.plan.outputs.build_matrix == '[]'))
      && needs.validate-deploy.result == 'success'
      && needs.validate-flake.result == 'success'
    name: "Deploy - ${{ matrix.host }} ${{ matrix.system }}: ${{ matrix.path }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.deploy_matrix) }}
    steps:
      - name: Generate Deploy Spec
        run: |
          jq -n \
            --arg agent "${{ matrix.host }}" \
            --arg path "${{ matrix.storePath }}" \
            --arg sys "${{ matrix.system }}" \
            --arg rollback "${{ matrix.rollbackScript }}" \
            '{"agents": {($agent): $path}, "rollbackScript": {($sys): $rollback}}' > "deploy-${{ matrix.host }}.json"
          echo "Generated deploy-${{ matrix.host }}.json:"
          cat "deploy-${{ matrix.host }}.json"
      # Determinate Nix Action is required here because the downstream cachix-action
      # requires a functional Nix installation on the runner to configure caching and
      # install/run the Cachix CLI, even though the deploy job itself performs no cold
      # Nix evaluations or builds.
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Deploy to Cachix Agent
        env:
          CACHIX_ACTIVATE_TOKEN: ${{ secrets.CACHIX_ACTIVATE_TOKEN }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          pin_deployed_state() {
            local pin_name="$1"
            local store_path="$2"
            local payload

            payload="$(jq -n \
              --arg name "$pin_name" \
              --arg storePath "$store_path" \
              '{name: $name, storePath: $storePath, artifacts: [], keep: null}')"

            curl -fsS \
              -H "Authorization: Bearer ${CACHIX_AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              "https://app.cachix.org/api/v1/cache/whitestrake/pin"
          }

          echo "deploy-${{ matrix.host }}.json content:"
          cat "deploy-${{ matrix.host }}.json"
          echo "Activating deployment for ${{ matrix.host }}..."
          cachix deploy activate "deploy-${{ matrix.host }}.json"
          echo "Pinning deployed state for ${{ matrix.host }} (${{ matrix.storePath }}) to Cachix..."
          pin_deployed_state "deployed-host-${{ matrix.host }}" "${{ matrix.storePath }}"
  validate-deploy:
    # NOTE (follow-up, Wave 2): this matrix is intentionally static. The deploy job
    # hard-requires `needs.validate-deploy.result == 'success'`, and GitHub reports
    # a non-matched/skipped matrix system as 'skipped' (not 'success'). Dynamically
    # scoping this matrix to only the systems present in the evaluated change set would
    # therefore risk turning a legitimate deploy into a blocked one, OR require
    # rewriting the deploy gate to treat "no deploy candidate for system X" as an
    # acceptable skip — which touches deploy gate semantics directly. Per the
    # zero-compromise-on-validation / preserve-gating constraints, this is deferred.
    # The schema/rollback checks here are cheap and fully cached, so the marginal cost
    # of validating both systems unconditionally is low.
    name: "Validate (deploy · ${{ matrix.system }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - name: Validate deploy-rs schema
        run: |
          nix build ".#checks.${{ matrix.system }}.deploy-schema-fast" --no-link --accept-flake-config
      - name: Validate deploy health rollback script
        run: |
          nix build ".#checks.${{ matrix.system }}.validate-deploy-health-rollback-script" --no-link --accept-flake-config
  complete:
    name: "CI/CD complete"
    needs: [plan, build, deploy, validate-deploy, validate-flake]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check build and deployment status
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          VALIDATE_FLAKE_RESULT: ${{ needs.validate-flake.result }}
          VALIDATE_DEPLOY_RESULT: ${{ needs.validate-deploy.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          BUILD_MATRIX: ${{ needs.plan.outputs.build_matrix }}
          DEPLOY_MATRIX: ${{ needs.plan.outputs.deploy_matrix }}
        run: |
          if [[ "$PLAN_RESULT" != "success" ]]; then
            echo "Plan stage failed or was not run."
            exit 1
          fi
          if [[ "$VALIDATE_FLAKE_RESULT" != "success" ]]; then
            echo "Flake validation failed."
            exit 1
          fi
          if [[ "$VALIDATE_DEPLOY_RESULT" != "success" ]]; then
            echo "Deploy validation failed."
            exit 1
          fi
          if [[ "$BUILD_RESULT" == "failure" || "$BUILD_RESULT" == "cancelled" ]]; then
            echo "Build stage failed or was cancelled."
            exit 1
          fi
          if [[ "$BUILD_RESULT" == "skipped" && "$BUILD_MATRIX" != "[]" && "$BUILD_MATRIX" != "" ]]; then
            echo "Build stage was skipped even though builds were planned."
            exit 1
          fi
          if [[ "$DEPLOY_RESULT" == "failure" || "$DEPLOY_RESULT" == "cancelled" ]]; then
            echo "Deployment stage failed or was cancelled."
            exit 1
          fi
          if [[ "$DEPLOY_RESULT" == "skipped" && "$DEPLOY_MATRIX" != "[]" && "$DEPLOY_MATRIX" != "" ]]; then
            echo "Deployment stage was skipped even though deployments were planned."
            exit 1
          fi
          echo "All validation, builds, and deployments succeeded or were skipped!"
          exit 0
