name: "CI: Build & Cache"

on:
  push:
  pull_request:

jobs:
  evaluate:
    name: Evaluate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.eval.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - id: eval
        name: Enumerate derivations & pre-flight cache check
        run: |
          # 1. Run Nix evaluation to get system, drvPath, and storePath of all hosts and checks
          NIX_OUTPUT=$(nix eval --json --impure --expr '
            with (builtins.getFlake (toString ./.)); {
              nixos = builtins.mapAttrs (name: conf: {
                system = conf.pkgs.system;
                drvPath = conf.config.system.build.toplevel.drvPath;
                storePath = conf.config.system.build.toplevel.outPath;
              }) nixosConfigurations;
              darwin = builtins.mapAttrs (name: conf: {
                system = conf.pkgs.system;
                drvPath = conf.system.drvPath;
                storePath = conf.system.outPath;
              }) darwinConfigurations;
              checks = builtins.mapAttrs (sys: checks: builtins.mapAttrs (name: check: {
                system = sys;
                drvPath = check.drvPath;
                storePath = check.outPath;
              }) checks) checks;
            }
          ' --accept-flake-config)

          # 2. Concurrently query binary caches and output GHA matrix
          python3 -c '
          import sys, json, urllib.request, concurrent.futures
          
          def get_runner(system):
              if system == "x86_64-linux": return "ubuntu-latest"
              elif system == "aarch64-linux": return "ubuntu-24.04-arm"
              elif system == "aarch64-darwin": return "macos-latest"
              return "ubuntu-latest"
          
          def is_cached(item):
              store_path = item.get("storePath")
              if not store_path: return False
              store_hash = store_path.split("/")[-1].split("-")[0]
              caches = [
                  "https://cache.nixos.org",
                  "https://cache.garnix.io",
                  "https://whitestrake.cachix.org"
              ]
              for cache in caches:
                  url = f"{cache}/{store_hash}.narinfo"
                  req = urllib.request.Request(url, method="HEAD")
                  try:
                      with urllib.request.urlopen(req, timeout=2) as resp:
                          if resp.status == 200: return True
                  except Exception: pass
              return False
          
          data = json.loads(sys.argv[1])
          candidates = []
          for name, conf in data.get("nixos", {}).items():
              candidates.append({
                  "name": f"nixosConfigurations.{name} ({conf[\"system\"]})",
                  "path": f"nixosConfigurations.{name}.config.system.build.toplevel",
                  "system": conf["system"],
                  "runner": get_runner(conf["system"]),
                  "storePath": conf["storePath"]
              })
          for name, conf in data.get("darwin", {}).items():
              candidates.append({
                  "name": f"darwinConfigurations.{name} ({conf[\"system\"]})",
                  "path": f"darwinConfigurations.{name}.system",
                  "system": conf["system"],
                  "runner": get_runner(conf["system"]),
                  "storePath": conf["storePath"]
              })
          for system, checks in data.get("checks", {}).items():
              for name, check in checks.items():
                  if name.startswith("deploy"): continue
                  candidates.append({
                      "name": f"checks.{name} ({system})",
                      "path": f"checks.{system}.{name}",
                      "system": system,
                      "runner": get_runner(system),
                      "storePath": check["storePath"]
                  })
          
          with concurrent.futures.ThreadPoolExecutor(max_workers=20) as executor:
              results = list(executor.map(is_cached, candidates))
          
          uncached = [item for item, cached in zip(candidates, results) if not cached]
          if not uncached:
              uncached = [{
                  "name": "No builds needed (all cached)",
                  "path": "",
                  "system": "x86_64-linux",
                  "runner": "ubuntu-latest",
                  "storePath": "",
                  "dummy": True
              }]
          
          print("matrix=" + json.dumps(uncached))
          ' "$NIX_OUTPUT" >> "$GITHUB_OUTPUT"

  build:
    needs: evaluate
    name: "Build ${{ matrix.name }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.evaluate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ !matrix.dummy }}
      - uses: DeterminateSystems/determinate-nix-action@v3
        if: ${{ !matrix.dummy }}
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        if: ${{ !matrix.dummy }}
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        if: ${{ !matrix.dummy }}
        run: nix build '.#${{ matrix.path }}' --print-build-logs

  all-builds-passed:
    name: "All Cachix Builds"
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "All builds succeeded!"
            exit 0
          else
            echo "One or more builds failed."
            exit 1
          fi
