name: "CI: Build & Cache"

on:
  push:
  pull_request:

jobs:
  evaluate:
    name: Evaluate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.eval.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - id: eval
        name: Enumerate host configurations
        run: |
          # 1. Run cheap evaluations to get hostname to system mappings from public outputs
          NIXOS=$(nix eval --json '.#nixosConfigurations' --apply 'builtins.mapAttrs (name: conf: conf.pkgs.system)' --accept-flake-config 2>/dev/null || echo "{}")
          DARWIN=$(nix eval --json '.#darwinConfigurations' --apply 'builtins.mapAttrs (name: conf: conf.pkgs.system)' --accept-flake-config 2>/dev/null || echo "{}")

          # 2. Format host mapping into GHA build matrix JSON
          MATRIX=$(jq -cn \
            --argjson nixos "$NIXOS" \
            --argjson darwin "$DARWIN" \
            '
            def runner($sys):
              if $sys == "x86_64-linux" then "ubuntu-latest"
              elif $sys == "aarch64-linux" then "ubuntu-24.04-arm"
              elif $sys == "aarch64-darwin" then "macos-latest"
              else "ubuntu-latest"
              end;

            ($nixos | to_entries | map({
              name: ("nixosConfigurations." + .key + " (" + .value + ")"),
              path: ("nixosConfigurations." + .key + ".config.system.build.toplevel"),
              system: .value,
              runner: runner(.value)
            })) +
            ($darwin | to_entries | map({
              name: ("darwinConfigurations." + .key + " (" + .value + ")"),
              path: ("darwinConfigurations." + .key + ".system"),
              system: .value,
              runner: runner(.value)
            }))
            ')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: evaluate
    name: "Build ${{ matrix.name }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.evaluate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: nix build '.#${{ matrix.path }}' --print-build-logs

  all-builds-passed:
    name: "All Cachix Builds"
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "All builds succeeded!"
            exit 0
          else
            echo "One or more builds failed."
            exit 1
          fi
