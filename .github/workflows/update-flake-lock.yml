name: "Flake.lock: update Nix dependencies"
on:
  workflow_dispatch: # allow manual runs
  schedule:
    - cron: "0 12 * * 6" # every Saturday 12:00 UTC
permissions:
  contents: read
jobs:
  nix-flake-update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Nix
        uses: ./.github/actions/install-nix
      - name: Update flake.lock
        run: nix flake update --accept-flake-config
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          branch: nix-update/flake-lock
          title: "chore: bump flake.lock"
          body: |
            Automated update of `flake.lock`.

            ---
            _This PR was created automatically by the flake lock update workflow._
          labels: |
            dependencies
            automated
          commit-message: "chore: bump flake.lock"
          delete-branch: true
