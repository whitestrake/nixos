name: "Cachix Deploy"
run-name: "Cachix Deploy"

on:
  deployment:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: "GitHub Deployment id to update."
        required: false
        default: ""
        type: string
      deployment_environment:
        description: "Deployment environment."
        required: true
        default: "production"
        type: string
      deployment_sha:
        description: "Commit SHA to deploy."
        required: true
        type: string
      deployment_source:
        description: "Deployment source label."
        required: true
        default: "github-actions"
        type: string
      matrix:
        description: "Deployment matrix JSON."
        required: true
        type: string

concurrency:
  group: cachix-deploy-master
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  prepare:
    name: "Prepare Cachix deploy"
    if: >-
      ${{
        github.event_name == 'workflow_dispatch'
        || github.event.deployment.task == 'deploy:cachix'
      }}
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.prepare.outputs.deploy }}
    steps:
      - name: Mark deployment started
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ github.event.deployment.id || inputs.deployment_id || '' }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment || inputs.deployment_environment }}
          DEPLOYMENT_SHA: ${{ github.event.deployment.sha || inputs.deployment_sha }}
          DEPLOYMENT_SOURCE: ${{ github.event.deployment.payload.source || inputs.deployment_source }}
          LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          master_rev="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/master" --jq '.object.sha')"

          if [ "$DEPLOYMENT_SOURCE" = "hercules-ci" ] && [ "$DEPLOYMENT_SHA" != "$master_rev" ]; then
            echo "Deployment is stale; skipping."
            echo "  deployment source: $DEPLOYMENT_SOURCE"
            echo "  deployment sha: $DEPLOYMENT_SHA"
            echo "  current master: $master_rev"
            echo "deploy=false" >> "$GITHUB_OUTPUT"

            if [ -n "$DEPLOYMENT_ID" ]; then
              gh api \
                -X POST \
                "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
                -f state=inactive \
                -f environment="$DEPLOYMENT_ENVIRONMENT" \
                -f log_url="$LOG_URL" \
                -f description="Skipped stale Cachix deploy"
            fi

            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"

          if [ -n "$DEPLOYMENT_ID" ]; then
            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
              -f state=in_progress \
              -f environment="$DEPLOYMENT_ENVIRONMENT" \
              -f log_url="$LOG_URL" \
              -f description="Cachix deploy started"
          fi

  deploy:
    name: "Deploy ${{ matrix.host }}"
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: >-
        ${{
          github.event_name == 'workflow_dispatch'
          && fromJSON(inputs.matrix)
          || github.event.deployment.payload.matrix
        }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: >-
            ${{
              github.event.deployment.sha
              || inputs.deployment_sha
            }}

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deploy Cachix agent
        shell: bash
        env:
          CACHIX_CACHE_NAME: whitestrake
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_ACTIVATE_TOKEN: ${{ secrets.CACHIX_ACTIVATE_TOKEN }}
          CACHIX_DEPLOY_FORCE: "false"
          CACHIX_DEPLOY_OUTPUT_DIR: ${{ runner.temp }}/cachix-deploy-host
          CACHIX_DEPLOYED_PIN_KEEP_REVISIONS: "10"
          DEPLOY_HOST: ${{ matrix.host }}
          DEPLOY_SYSTEM: ${{ matrix.system }}
          DEPLOY_STORE_PATH: ${{ matrix.storePath }}
          DEPLOY_ROLLBACK_SCRIPT: ${{ matrix.rollbackScript }}
        run: bash modules/deployment/scripts/cachix-github-deploy-host.sh

  finish:
    name: "Mark GitHub Deployment finished"
    needs:
      - prepare
      - deploy
    if: ${{ always() && github.event_name == 'deployment' && github.event.deployment.task == 'deploy:cachix' }}
    runs-on: ubuntu-latest
    steps:
      - name: Mark deployment final status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ github.event.deployment.id }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          PREPARE_DEPLOY: ${{ needs.prepare.outputs.deploy }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "No GitHub Deployment id; skipping final deployment status."
            exit 0
          fi

          if [ "$PREPARE_RESULT" != "success" ]; then
            state=failure
            description="Cachix deploy preparation failed"
          elif [ "$PREPARE_DEPLOY" != "true" ]; then
            echo "Deployment was already marked inactive during preparation."
            exit 0
          elif [ "$DEPLOY_RESULT" = "success" ]; then
            state=success
            description="Cachix deploy succeeded"
          else
            state=failure
            description="Cachix deploy failed"
          fi

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state="$state" \
            -f environment="$DEPLOYMENT_ENVIRONMENT" \
            -f log_url="$LOG_URL" \
            -f description="$description"
