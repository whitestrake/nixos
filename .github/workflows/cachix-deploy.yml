name: "Cachix Deploy"
run-name: "Cachix Deploy"

on:
  status:
  workflow_dispatch:
    inputs:
      hosts:
        description: "Comma-separated hosts to deploy. Empty previews changed hosts; all deploys every deployable host."
        required: false
        default: ""
        type: string
      force:
        description: "Redeploy selected hosts even when deployed-host-* already matches built state."
        required: true
        default: false
        type: boolean

concurrency:
  group: cachix-deploy-master
  cancel-in-progress: false

permissions:
  contents: read
  statuses: read

jobs:
  plan:
    name: "Plan Cachix deploy"
    if: >-
      ${{
        github.event_name == 'workflow_dispatch'
        || (
          github.event.context == 'ci/hercules/onPush/deployables'
          && github.event.state == 'success'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      selected_count: ${{ steps.plan.outputs.selected_count }}
      preview: ${{ steps.plan.outputs.preview }}
      selected_hosts: ${{ steps.plan.outputs.selected_hosts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'status' && github.event.sha || github.sha }}

      - name: Wait for Hercules CI commit statuses
        if: ${{ github.event_name == 'status' }}
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.sha;
            const prefix = "ci/hercules/onPush/";
            const sentinel = "ci/hercules/onPush/deployables";
            const timeoutMs = 10 * 60 * 1000;
            const pollMs = 5000;
            const deadline = Date.now() + timeoutMs;
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

            while (true) {
              const { data } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });

              if (data.total_count > data.statuses.length) {
                core.setFailed(
                  `GitHub returned ${data.statuses.length}/${data.total_count} statuses for ${sha}; pagination is required.`
                );
                return;
              }

              const hci = data.statuses
                .filter(s => s.context.startsWith(prefix))
                .sort((a, b) => a.context.localeCompare(b.context));

              core.info(
                "Hercules statuses:\n" +
                hci.map(s => `  ${s.context}: ${s.state} ${s.description ?? ""}`).join("\n")
              );

              const failed = hci.filter(s => s.state === "failure" || s.state === "error");
              if (failed.length > 0) {
                core.setFailed(
                  "Hercules CI failed statuses:\n" +
                  failed.map(s => `  ${s.context}: ${s.state} ${s.description ?? ""}`).join("\n")
                );
                return;
              }

              const deployables = hci.find(s => s.context === sentinel);
              const pending = hci.filter(s => s.state !== "success");

              if (deployables?.state === "success" && pending.length === 0) {
                core.info(`All Hercules CI commit statuses are successful for ${sha}`);
                return;
              }

              if (Date.now() >= deadline) {
                core.setFailed(
                  "Timed out waiting for Hercules CI statuses:\n" +
                  pending.map(s => `  ${s.context}: ${s.state} ${s.description ?? ""}`).join("\n")
                );
                return;
              }

              await sleep(pollMs);
            }

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Plan deploy from HCI state
        id: plan
        shell: bash
        env:
          HERCULES_CI_CREDENTIALS_JSON: ${{ secrets.HERCULES_CI_CREDENTIALS_JSON }}
          HCI_PROJECT: github/whitestrake/nixos
          CACHIX_CACHE_NAME: whitestrake
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_DEPLOY_REV: ${{ github.event_name == 'status' && github.event.sha || github.sha }}
          CACHIX_DEPLOY_HOSTS: ${{ github.event_name == 'workflow_dispatch' && inputs.hosts || '' }}
          CACHIX_DEPLOY_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
          CACHIX_DEPLOY_OUTPUT_DIR: ${{ runner.temp }}/cachix-deploy-plan
        run: nix shell nixpkgs#hci -c bash modules/deployment/scripts/cachix-github-deploy-plan.sh

      - name: Upload Cachix deploy plan
        if: ${{ steps.plan.outputs.selected_count != '0' }}
        uses: actions/upload-artifact@v7
        with:
          name: cachix-deploy-plan
          path: ${{ runner.temp }}/cachix-deploy-plan/deploy-plan.json
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: "Deploy ${{ matrix.host }}"
    needs: plan
    if: ${{ needs.plan.outputs.selected_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'status' && github.event.sha || github.sha }}

      - name: Download Cachix deploy plan
        uses: actions/download-artifact@v8
        with:
          name: cachix-deploy-plan
          path: ${{ runner.temp }}/cachix-deploy-plan

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deploy Cachix agent
        shell: bash
        env:
          CACHIX_CACHE_NAME: whitestrake
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_ACTIVATE_TOKEN: ${{ secrets.CACHIX_ACTIVATE_TOKEN }}
          CACHIX_DEPLOY_FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
          CACHIX_DEPLOY_OUTPUT_DIR: ${{ runner.temp }}/cachix-deploy-host
          CACHIX_DEPLOY_PLAN_FILE: ${{ runner.temp }}/cachix-deploy-plan/deploy-plan.json
          CACHIX_DEPLOYED_PIN_KEEP_REVISIONS: "10"
          DEPLOY_HOST: ${{ matrix.host }}
        run: bash modules/deployment/scripts/cachix-github-deploy-host.sh
