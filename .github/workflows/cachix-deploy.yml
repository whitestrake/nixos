name: "Cachix Deploy"
run-name: "Cachix Deploy"

on:
  deployment:

concurrency:
  group: cachix-deploy-master
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  prepare:
    name: "Prepare GitHub Deployment"
    if: ${{ github.event.deployment.task == 'deploy:cachix' }}
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.prepare.outputs.deploy }}
    steps:
      - name: Mark deployment started
        id: prepare
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ github.event.deployment.id }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_SHA: ${{ github.event.deployment.sha }}
          DEPLOYMENT_SOURCE: ${{ github.event.deployment.payload.source }}
          LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          master_rev="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/master" --jq '.object.sha')"

          if [ "$DEPLOYMENT_SOURCE" = "hercules-ci" ] && [ "$DEPLOYMENT_SHA" != "$master_rev" ]; then
            echo "Deployment $DEPLOYMENT_ID is stale; marking inactive."
            echo "  deployment source: $DEPLOYMENT_SOURCE"
            echo "  deployment sha: $DEPLOYMENT_SHA"
            echo "  current master: $master_rev"
            echo "deploy=false" >> "$GITHUB_OUTPUT"

            gh api \
              -X POST \
              "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
              -f state=inactive \
              -f environment="$DEPLOYMENT_ENVIRONMENT" \
              -f log_url="$LOG_URL" \
              -f description="Skipped stale Cachix deploy"

            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state=in_progress \
            -f environment="$DEPLOYMENT_ENVIRONMENT" \
            -f log_url="$LOG_URL" \
            -f description="Cachix deploy started"

  deploy:
    name: "Deploy ${{ matrix.host }}"
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ github.event.deployment.payload.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: whitestrake
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Deploy Cachix agent
        shell: bash
        env:
          CACHIX_CACHE_NAME: whitestrake
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_ACTIVATE_TOKEN: ${{ secrets.CACHIX_ACTIVATE_TOKEN }}
          CACHIX_DEPLOY_FORCE: "false"
          CACHIX_DEPLOY_OUTPUT_DIR: ${{ runner.temp }}/cachix-deploy-host
          CACHIX_DEPLOYED_PIN_KEEP_REVISIONS: "10"
          DEPLOY_HOST: ${{ matrix.host }}
          DEPLOY_SYSTEM: ${{ matrix.system }}
          DEPLOY_STORE_PATH: ${{ matrix.storePath }}
          DEPLOY_ROLLBACK_SCRIPT: ${{ matrix.rollbackScript }}
        run: bash modules/deployment/scripts/cachix-github-deploy-host.sh

  finish:
    name: "Mark GitHub Deployment finished"
    needs:
      - prepare
      - deploy
    if: ${{ always() && needs.prepare.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Mark deployment final status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ github.event.deployment.id }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          LOG_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail

          if [ "$RESULT" = "success" ]; then
            state=success
            description="Cachix deploy succeeded"
          else
            state=failure
            description="Cachix deploy failed"
          fi

          gh api \
            -X POST \
            "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state="$state" \
            -f environment="$DEPLOYMENT_ENVIRONMENT" \
            -f log_url="$LOG_URL" \
            -f description="$description"
