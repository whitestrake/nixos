# yaml-language-server: $schema=https://garnix.io/api/garnix-config-schema.json

builds:
  exclude:
    - "checks.*.deploy-activate"
    - "checks.*.deploy-schema"
    - "checks.*.deploy-schema-fast"
    - "packages.aarch64-darwin.*"
  include:
    - "*.x86_64-linux.*"
    - "*.aarch64-linux.*"
    - "*.aarch64-darwin.*"
    - nixosConfigurations.*
    - darwinConfigurations.*
